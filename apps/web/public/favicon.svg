<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1E32"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g transform="translate(256,256)">
    <!-- Left bracket < -->
    <path d="M-40,-80 L-120,0 L-40,80" fill="none" stroke="#FFDE42" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right bracket > with slash -->
    <path d="M40,-80 L120,0 L40,80" fill="none" stroke="#FFC76E" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Slash / -->
    <line x1="30" y1="-100" x2="-30" y2="100" stroke="#F0FA13" stroke-width="32" stroke-linecap="round"/>
  </g>
</svg>
